<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="assets/js/step-1.js"></script>
<link rel="stylesheet" href="assets/css/step-1.css" />

  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 sm:p-12 selection:bg-primary-container selection:text-on-primary-container">
<!-- Onboarding Flow Header -->
<div class="w-full max-w-2xl flex flex-col items-center mb-12">
<div class="flex items-center gap-2 mb-8">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="auto_awesome">auto_awesome</span>
<span class="font-headline font-black text-2xl tracking-tighter text-primary">Clavyy</span>
</div>
<!-- Progress Container (Tactile Scholar Style) -->
<div class="w-full h-4 bg-surface-container-low rounded-full p-1 neumorphic-inset overflow-hidden relative">
<div class="h-full w-1/4 bg-gradient-to-r from-primary to-primary-container rounded-full shadow-lg shadow-primary/20 relative overflow-hidden transition-all duration-500">
<!-- Glossy overlay for "Clay" effect -->
<div class="absolute inset-0 bg-white/20 blur-[1px]"></div>
</div>
</div>
<div class="mt-4 flex justify-between w-full px-2">
<span class="text-xs font-bold text-primary tracking-widest uppercase">Progress</span>
<span class="text-xs font-bold text-primary tracking-widest uppercase">Step 1/4</span>
</div>
</div>
<!-- Main Question Section -->
<main class="w-full max-w-2xl">
<div class="mb-10 text-center">
<h1 class="font-headline text-4xl sm:text-5xl font-extrabold text-on-surface tracking-tight leading-tight mb-4">
                What's your current level of study?
            </h1>
<p class="text-on-surface-variant text-lg">
                We'll tailor your AI learning journey based on your academic stage.
            </p>
</div>
<!-- Interactive Cards Grid (Asymmetric layout feeling through card content) -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-12">
<!-- Card 1 -->
<button class="neumorphic-card group flex flex-col items-start p-8 rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-all duration-300 active:scale-95 text-left border-none outline-none">
<div class="w-14 h-14 rounded-full bg-secondary-container flex items-center justify-center mb-6 shadow-lg shadow-secondary-container/30 transition-transform group-hover:rotate-12">
<span class="material-symbols-outlined text-on-secondary-container text-3xl" data-icon="child_care">child_care</span>
</div>
<h3 class="font-headline text-xl font-bold text-on-surface mb-2">Middle School</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">Foundation learning and exploring new concepts.</p>
</button>
<!-- Card 2 -->
<button class="neumorphic-card group flex flex-col items-start p-8 rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-all duration-300 active:scale-95 text-left border-none outline-none">
<div class="w-14 h-14 rounded-full bg-tertiary-container flex items-center justify-center mb-6 shadow-lg shadow-tertiary-container/30 transition-transform group-hover:rotate-12">
<span class="material-symbols-outlined text-on-tertiary-container text-3xl" data-icon="school">school</span>
</div>
<h3 class="font-headline text-xl font-bold text-on-surface mb-2">High School</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">Deep dives into core subjects and exam preparation.</p>
</button>
<!-- Card 3 (Active State Mockup) -->
<button class="relative flex flex-col items-start p-8 rounded-xl bg-primary text-white transition-all duration-300 scale-[1.02] shadow-2xl shadow-primary/25 border-none outline-none overflow-hidden">
<div class="absolute top-0 right-0 p-4">
<span class="material-symbols-outlined text-white/50 text-2xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="w-14 h-14 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center mb-6 bg-clay-active">
<span class="material-symbols-outlined text-white text-3xl" data-icon="account_balance">account_balance</span>
</div>
<h3 class="font-headline text-xl font-bold mb-2">University</h3>
<p class="text-on-primary text-sm leading-relaxed">Specialized research and advanced academic mastery.</p>
</button>
<!-- Card 4 -->
<button class="neumorphic-card group flex flex-col items-start p-8 rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-all duration-300 active:scale-95 text-left border-none outline-none">
<div class="w-14 h-14 rounded-full bg-secondary-container flex items-center justify-center mb-6 shadow-lg shadow-secondary-container/30 transition-transform group-hover:rotate-12">
<span class="material-symbols-outlined text-on-secondary-container text-3xl" data-icon="work">work</span>
</div>
<h3 class="font-headline text-xl font-bold text-on-surface mb-2">Professional</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">Lifelong learning and career-focused skill building.</p>
</button>
</div>
<!-- Call to Action -->
<div class="flex flex-col sm:flex-row items-center justify-between gap-6">
<button class="flex items-center gap-2 text-on-surface-variant font-semibold hover:text-primary transition-colors px-6 py-4">
<span class="material-symbols-outlined text-xl" data-icon="arrow_back">arrow_back</span>
                Back
            </button>
<button class="w-full sm:w-auto px-12 py-4 rounded-full bg-gradient-to-r from-primary to-primary-dim text-white font-headline font-bold text-lg shadow-xl shadow-primary/30 hover:scale-105 active:scale-95 transition-all duration-300 flex items-center justify-center gap-3">
                Next
                <span class="material-symbols-outlined text-2xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- Decorative Elements (The Tactile Scholar Signature) -->
<div class="fixed top-20 -left-10 w-64 h-64 bg-primary-container/20 rounded-full blur-[100px] pointer-events-none -z-10"></div>
<div class="fixed bottom-20 -right-10 w-80 h-80 bg-tertiary-container/20 rounded-full blur-[120px] pointer-events-none -z-10"></div>
<!-- Asymmetric Background Images -->
<div class="fixed top-1/4 right-0 w-32 h-64 opacity-10 pointer-events-none hidden lg:block">
<img alt="" class="w-full h-full object-cover rounded-l-xl" data-alt="Abstract soft geometric shapes and curves in periwinkle blue and white, clean and modern minimalist education aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDTuvxqAkVw3BFzX4mwwhMMXhLeUyPtQo7z2aOypXWETa_R0_TT--SlU5GH-FcIRh5XSeKhjui73RkZDcvhZ-1n0WYmsZS4dvHbEFVS0ZgqVqjJcTYEZSBPlZR-xHREYRFgTrlzLxuOjeqyC0PRcLxluyGk08gRPPfevGC404z0oNO4A37JB1qu2x9XEc7kaPlZWJGIYBQ1iLpaJd1AolK4egPS0uaTcYgoWV_amw7jl5E0no6HYJ1g7vzS0hIx9rOAdjmNOFhiS5n6"/>
</div>
</body></html>
